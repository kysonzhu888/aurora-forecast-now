name = "aurora-forecast-now-api"
main = "workers/forecast-worker.js"
compatibility_date = "2026-06-30"
workers_dev = true

routes = [
  { pattern = "auroraforecastnow.com/api/*", zone_name = "auroraforecastnow.com" }
]

kv_namespaces = [
  { binding = "AURORA_FORECAST_CACHE", id = "d9e81de8d6034fa291e829ba93aa1132" }
]

[[d1_databases]]
binding = "COMMENTS_DB"
database_name = "aurora-forecast-now-comments"
database_id = "982edd3e-006a-41f6-8023-577fabc0ab6d"

[vars]
ALERT_FROM_EMAIL = "alerts@tinyneed.com"
ALERT_EMAIL_RELAY_URL = "https://tinyneed.com/api/aurora-email"

[triggers]
crons = ["*/5 * * * *"]
